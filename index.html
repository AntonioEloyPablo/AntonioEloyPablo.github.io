<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Juego Elena García Armada</title>
<style>
body { margin:0; height:100vh; font-family:'Poppins',sans-serif; display:flex; align-items:center; justify-content:center; background: linear-gradient(135deg,#0f172a,#1e3a8a); color:white; }
.card { width:1000px; padding:30px; border-radius:25px; background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); box-shadow: 0 0 50px rgba(0,0,0,0.5); position: relative; text-align: center; }
h1 {color:#93c5fd; font-size:22px; margin-bottom:20px;}
.info {font-size:14px; color:#cbd5f5; margin-bottom:20px;}
.match-container {display:flex; justify-content:space-between;}
.match-column {display:flex; flex-direction:column; gap:12px;}
.match-item {padding:10px; background: rgba(255,255,255,0.1); border-radius:8px; cursor:pointer; transition:0.3s;}
.correct {background: rgba(34,197,94,0.5) !important;}
.selected {border:2px solid #3b82f6;}
#message {margin-top:20px; font-size:16px; color:#f87171; min-height:20px;}
#continueBtn, #continueBtn2, #continueBtn3, #continueBtn4 {margin-top:20px; padding:10px 20px; font-size:16px; border:none; border-radius:8px; background:#3b82f6; color:white; cursor:pointer; display:none;}
.sopa-container {margin-top:20px; display:grid; grid-template-columns: repeat(12, 30px); gap:2px; justify-content:center;}
.sopa-letter {width:30px; height:30px; display:flex; align-items:center; justify-content:center; background: rgba(255,255,255,0.1); border-radius:4px; cursor:pointer; user-select:none; transition:0.2s; text-transform: lowercase;}
.sopa-selected {background:#3b82f6;}
.sopa-correct {background: rgba(34,197,94,0.5);}
.texto {font-size:16px; margin-top:20px; line-height:1.8; text-align:left;}
.subrayado {text-decoration: underline;}
.hueco {display:inline-block; width:180px; border-bottom:1px solid #93c5fd; margin:0 5px; cursor:pointer; text-align:center; color:white;}
.palabras-opcion {margin-top:20px; display:flex; gap:10px; flex-wrap: wrap; justify-content:center;}
.palabra {padding:5px 10px; background:#3b82f6; border-radius:5px; cursor:pointer;}
.vf-container {margin-top:20px; display:flex; flex-direction:column; gap:15px; text-align:left;}
.vf-item {margin-bottom:10px;}
.vf-buttons {display:flex; gap:10px; margin-top:5px;}
.vf-buttons button {padding:5px 12px; border:none; border-radius:5px; background:#3b82f6; color:white; cursor:pointer; transition:0.3s;}
.vf-correct {background: rgba(34,197,94,0.5) !important; color:white;}
.vf-incorrect {color:#f87171;}
</style>
</head>
<body>
<div class="card" id="card"></div>
<script>
const card = document.getElementById('card');

function iniciarUnirFrases(){
    card.innerHTML=`<h1>Unir frases sobre Elena García Armada</h1>
    <div class='info'>Selecciona primero una palabra de la izquierda, luego la palabra correcta de la derecha.</div>
    <div class='match-container' id='matchContainer'></div>
    <div id='message'></div>
    <button id='continueBtn'>Continuar</button>`;

    const leftWords = ['Elena García Armada','Marsi Bionics','Exoesqueleto','Premio Inventor Europeo 2022'];
    const rightWords = ['Ingeniera industrial y roboticista española','Empresa que desarrolla exoesqueletos pediátricos','Permite a niños caminar','Reconocimiento internacional por innovación en salud'];
    const correctPairs = {'Elena García Armada':'Ingeniera industrial y roboticista española','Marsi Bionics':'Empresa que desarrolla exoesqueletos pediátricos','Exoesqueleto':'Permite a niños caminar','Premio Inventor Europeo 2022':'Reconocimiento internacional por innovación en salud'};

    let matchContainer = document.getElementById('matchContainer');
    let messageDiv = document.getElementById('message');
    let selectedLeft = null, completed = [];
    let continueBtn = document.getElementById('continueBtn');

    let leftCol = document.createElement('div'); leftCol.className='match-column';
    let rightCol = document.createElement('div'); rightCol.className='match-column';
    let shuffledRight = [...rightWords].sort(()=>Math.random()-0.5);

    leftWords.forEach(word=>{
        let div = document.createElement('div'); div.className = 'match-item'; div.innerText = word;
        div.onclick = () => { if(selectedLeft) selectedLeft.classList.remove('selected'); selectedLeft = div; div.classList.add('selected'); messageDiv.innerText=''; };
        leftCol.appendChild(div);
    });

    shuffledRight.forEach(word=>{
        let div = document.createElement('div'); div.className='match-item'; div.innerText=word;
        div.onclick = () => {
            if(!selectedLeft) return;
            if(correctPairs[selectedLeft.innerText]===div.innerText){
                selectedLeft.classList.add('correct'); div.classList.add('correct'); completed.push({left:selectedLeft,right:div});
                messageDiv.innerText='';
            } else messageDiv.innerText='Incorrecto';
            selectedLeft.classList.remove('selected'); selectedLeft=null;
            if(completed.length===leftWords.length) continueBtn.style.display='inline-block';
        };
        rightCol.appendChild(div);
    });

    matchContainer.appendChild(leftCol); matchContainer.appendChild(rightCol);
    continueBtn.onclick = () => iniciarSopa();
}

function iniciarSopa(){
    card.innerHTML=`<h1>Sopa de letras</h1>
    <div class='texto' id='textoContainer'>Elena García Armada es especialista en <span class='subrayado'>robótica</span> y desarrolla <span class='subrayado'>exoesqueletos</span> para niños.</div>
    <div class='sopa-container' id='sopaContainer'></div>
    <div id='message'></div>
    <button id='continueBtn2' style='display:none;'>Continuar</button>`;

    const palabra1='robótica';
    const palabra2='exoesqueleto';
    const sopaContainer = document.getElementById('sopaContainer');
    const continueBtn2 = document.getElementById('continueBtn2');
    const message = document.getElementById('message');
    const gridSize = 12;
    let letters=[];

    for(let i=0;i<gridSize*gridSize;i++){
        let span = document.createElement('div'); span.className='sopa-letter';
        span.innerText=String.fromCharCode(97+Math.floor(Math.random()*26));
        span.dataset.palabra=''; sopaContainer.appendChild(span); letters.push(span);
    }
    let row1=Math.floor(Math.random()*gridSize), startCol1=Math.floor(Math.random()*(gridSize-palabra1.length));
    for(let i=0;i<palabra1.length;i++) letters[row1*gridSize+startCol1+i].innerText=palabra1[i], letters[row1*gridSize+startCol1+i].dataset.palabra='palabra1';

    let col2,rowStart2;
    do {col2=Math.floor(Math.random()*gridSize); rowStart2=Math.floor(Math.random()*(gridSize-palabra2.length));}
    while(col2 >= startCol1 && col2 < startCol1+palabra1.length && row1>=rowStart2 && row1<rowStart2+palabra2.length);
    for(let i=0;i<palabra2.length;i++) letters[(rowStart2+i)*gridSize+col2].innerText=palabra2[i], letters[(rowStart2+i)*gridSize+col2].dataset.palabra='palabra2';

    let indices={palabra1:0,palabra2:0};
    letters.forEach(span=>{
        span.onclick=()=>{
            let p=span.dataset.palabra; if(!p) return;
            let palabraCorrecta=p==='palabra1'?palabra1:palabra2;
            if(span.innerText===palabraCorrecta[indices[p]]){
                span.classList.add('sopa-selected'); indices[p]++;
                if(indices[p]===palabraCorrecta.length){
                    letters.filter(l=>l.dataset.palabra===p).forEach(l=>l.classList.remove('sopa-selected')); 
                    letters.filter(l=>l.dataset.palabra===p).forEach(l=>l.classList.add('sopa-correct'));
                    if(document.querySelectorAll('.sopa-correct').length>=palabra1.length+palabra2.length) continueBtn2.style.display='inline-block';
                }
            } else { message.innerText='Incorrecto'; }
        };
    });

    continueBtn2.onclick = () => iniciarVF();
}

function iniciarVF(){
    card.innerHTML=`<h1>Verdadero o Falso</h1>
    <div class='texto'>Elena García Armada es ingeniera industrial y roboticista española. Fundó Marsi Bionics, empresa que desarrolla exoesqueletos pediátricos innovadores. Su trabajo ha ayudado a niños con movilidad reducida. Ha recibido reconocimientos internacionales y colabora con instituciones educativas y científicas.</div>
    <div class='vf-container' id='vfContainer'></div>
    <div id='message'></div>
    <button id='continueBtn3' style='display:none;'>Continuar</button>`;

    const frases=[
        {texto:'Elena fundó Marsi Bionics.', correct:true},
        {texto:'Su área de trabajo es la robótica aplicada a la salud.', correct:true},
        {texto:'Ha desarrollado exoesqueletos para niños.', correct:true},
        {texto:'Ha recibido el Premio Inventor Europeo 2022.', correct:true},
        {texto:'No tiene formación en ingeniería.', correct:false},
        {texto:'Colabora con instituciones educativas.', correct:true},
        {texto:'Su trabajo está relacionado con astronomía.', correct:false}
    ];

    const vfContainer=document.getElementById('vfContainer');
    const mensaje=document.getElementById('message');
    const continueBtn3=document.getElementById('continueBtn3');

    frases.forEach(f=>{
        let div=document.createElement('div'); div.className='vf-item';
        div.innerHTML=`<span>${f.texto}</span><div class='vf-buttons'><button>Verdadero</button><button>Falso</button></div>`;
        const btns=div.querySelectorAll('button');
        btns[0].onclick=()=> checkVF(f,true,btns[0],btns[1]);
        btns[1].onclick=()=> checkVF(f,false,btns[1],btns[0]);
        vfContainer.appendChild(div);
    });

    function checkVF(f,selected,clickedBtn,otherBtn){
        if(selected===f.correct){
            clickedBtn.classList.add('vf-correct'); clickedBtn.disabled=true; otherBtn.disabled=true;
            mensaje.innerText='';
        } else { mensaje.innerText='Incorrecto'; }
        if([...document.querySelectorAll('.vf-item')].every(d=>[...d.querySelectorAll('button')].every(b=>b.disabled))) continueBtn3.style.display='inline-block';
    }

    continueBtn3.onclick = () => iniciarTextoHuecosFinal();
}

function iniciarTextoHuecosFinal(){
    card.innerHTML=`<h1>Completa el texto en orden</h1>
    <div class='texto' id='textoContainer'>Elena García Armada nació en <span class='hueco' data-answer='España'></span> y estudió <span class='hueco' data-answer='ingeniería industrial'></span>. Fundó <span class='hueco' data-answer='Marsi Bionics'></span> y desarrolló <span class='hueco' data-answer='exoesqueletos pediátricos'></span> para <span class='hueco' data-answer='niños con movilidad reducida'></span>. Ha recibido <span class='hueco' data-answer='premios internacionales'></span> y colabora con <span class='hueco' data-answer='instituciones educativas'></span>. Su trabajo en <span class='hueco' data-answer='robótica avanzada'></span> le ha permitido innovar en <span class='hueco' data-answer='tecnología de asistencia'></span> y mejorar la <span class='hueco' data-answer='salud y calidad de vida'></span> de muchos.</div>
    <div class='palabras-opcion' id='palabrasOpciones'></div>
    <div id='message'></div>
    <button id='continueBtn4'>Finalizar</button>`;

    const palabras=['España','ingeniería industrial','Marsi Bionics','exoesqueletos pediátricos','niños con movilidad reducida','premios internacionales','instituciones educativas','robótica avanzada','tecnología de asistencia','salud y calidad de vida'];
    const huecos=document.querySelectorAll('.hueco');
    const palabrasOpciones=document.getElementById('palabrasOpciones');
    const mensaje=document.getElementById('message');
    const continueBtn4=document.getElementById('continueBtn4');

    let indiceActual=0;

    palabras.forEach(p=>{
        let div=document.createElement('div'); div.className='palabra'; div.innerText=p;
        div.onclick=()=>{
            if(indiceActual>=huecos.length) return;
            const huecoActual = huecos[indiceActual];
            if(p===huecoActual.dataset.answer){
                huecoActual.innerText=p;
                huecoActual.style.color='#22c55e';
                div.style.display='none';
                mensaje.innerText='';
                indiceActual++;
            } else { mensaje.innerText='Incorrecto'; }
            if(indiceActual===huecos.length) continueBtn4.style.display='inline-block';
        };
        palabrasOpciones.appendChild(div);
    });

    continueBtn4.onclick = () => {
        card.innerHTML = `<h1>¡Has completado el scape room!</h1>
        <p>¡Felicidades! Has terminado todos los desafíos sobre Elena García Armada.</p>
        <button id="reiniciarBtn">Reiniciar Juego</button>`;
        document.getElementById('reiniciarBtn').onclick = () => iniciarUnirFrases();
    };
}

iniciarUnirFrases();
</script>
</body>
</html>
